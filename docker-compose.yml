version: '3.9'
services:
  mysql:
    image: mysql:8.0
    container_name: finance-saas-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: finance_saas
      MYSQL_USER: finance_user
      MYSQL_PASSWORD: finance_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-prootpassword']
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: finance-saas-backend
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      NODE_ENV: production
      BACKEND_PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: finance_saas
      DB_USER: finance_user
      DB_PASSWORD: finance_password
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - '5000:5000'

  frontend:
    build:
      context: ./frontend
    container_name: finance-saas-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: finance-saas-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mysql_data:
